        // ==========================================
        // 2. STATE MANAGEMENT

        let state = {
            activeTab: 'dashboard',
            courses: [],
            profile: { firstName: 'นักศึกษา', lastName: 'ใจดี', studentId: '67XXXXXXX' },
            conditions: { hasF: false, hasRepeats: false, graduatesInTime: true },
            editingId: null,

            aiLoading: false,
            aiAdvice: ""

        const LOCAL_STORAGE_KEY = 'mygradpath_local_data';

        function loadData() {
            const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    if (parsed.courses) state.courses = parsed.courses;
                    if (parsed.profile) state.profile = parsed.profile;
                    if (parsed.conditions) state.conditions = parsed.conditions;
                } catch (e) {
                    console.error("Failed to parse local data", e);
                }
            }
        }

        function saveData() {
            const dataToSave = { courses: state.courses, profile: state.profile, conditions: state.conditions };
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(dataToSave));
        }

        // ==========================================
        // 3. CALCULATIONS
        // ==========================================
        function calculateStats() {
            let totalCredits = 0; 
            let totalGradePoints = 0;
            let gpaCredits = 0; 
            const categoryCredits = {
                genEd: { total: 0, subs: { thai: 0, foreign: 0, sci: 0, math: 0, social: 0, human: 0, other: 0 } },
                core: 0, majorReq: 0, majorElec: 0, freeElec: 0
            };
            let calculatedHasF = false;

            state.courses.forEach(c => {
                const cred = Number(c.credits);
                
                // ไม่นำ S และ U มาคิด GPA
                if (c.grade !== 'S' && c.grade !== 'U') {
                    gpaCredits += cred;
                    totalGradePoints += cred * (GRADE_WEIGHTS[c.grade] || 0);
                }

                if (c.grade === 'F' || c.grade === 'U') calculatedHasF = true;
                else {
                    totalCredits += cred;
                    if (c.category === 'genEd') {
                        categoryCredits.genEd.total += cred;
                        if (c.subCategory && categoryCredits.genEd.subs[c.subCategory] !== undefined) {
                            categoryCredits.genEd.subs[c.subCategory] += cred;
                        }
                    } else if (categoryCredits[c.category] !== undefined) {
                        categoryCredits[c.category] += cred;
                    }
                }
            });

            const gpaRaw = gpaCredits > 0 ? (totalGradePoints / gpaCredits) : 0;
            const gpa = gpaRaw.toFixed(2);
            const actualHasF = state.conditions.hasF || calculatedHasF;

            // Honors Logic
            let honors = "ไม่มีสิทธิ์ (Not Eligible)";
            let honorsColor = "bg-[#FF6B6B] text-black";
            
            if (!actualHasF && !state.conditions.hasRepeats && state.conditions.graduatesInTime) {
                if (gpaRaw >= 3.75) { honors = "เกียรตินิยมอันดับ 1"; honorsColor = "bg-[#FFBE5D] text-black"; } 
                else if (gpaRaw >= 3.25) { honors = "เกียรตินิยมอันดับ 2"; honorsColor = "bg-[#7495E8] text-black"; } 
                else { honors = "เกณฑ์ปกติ"; honorsColor = "bg-gray-300 text-black"; }
            } else {
                if (actualHasF) honors += " (เคยติด F หรือ U)";
                else if (state.conditions.hasRepeats) honors += " (มีรีเกรด)";
                else if (!state.conditions.graduatesInTime) honors += " (เรียนเกินกำหนด)";
            }

            // Student Status Logic
            let studentStatus = "ปกติ (Normal)";
            let studentStatusColor = "text-[#34D399]";
            if (gpaCredits > 0) {
                if (gpaRaw < 1.50) {
                    studentStatus = "พ้นสภาพ (Dismissed)";
                    studentStatusColor = "text-[#FF6B6B]";
                } else if (gpaRaw >= 1.50 && gpaRaw < 2.00) {
                    studentStatus = "วิทยาทัณฑ์ (Probation)";
                    studentStatusColor = "text-[#FFBE5D]";
                }
            } else {
                studentStatus = "ยังไม่มีข้อมูล";
                studentStatusColor = "text-gray-400";
            }

            return { totalCredits, gpa, honors, honorsColor, studentStatus, studentStatusColor, categoryCredits };
        }

        function getTermGroups() {
            const groups = {};
            state.courses.forEach(c => {
                const key = `ปี ${c.year} เทอม ${c.term === 'Summer' ? 'S' : c.term}`;
                if (!groups[key]) groups[key] = { label: key, year: c.year, term: c.term, courses: [], gpa: 0, creditsForGpa: 0, points: 0 };
                groups[key].courses.push(c);
                
                const cred = Number(c.credits);
                if (c.grade !== 'S' && c.grade !== 'U') {
                    groups[key].creditsForGpa += cred;
                    groups[key].points += cred * (GRADE_WEIGHTS[c.grade] || 0);
                }
            });
            
            Object.keys(groups).forEach(k => {
               groups[k].gpa = groups[k].creditsForGpa > 0 ? (groups[k].points / groups[k].creditsForGpa).toFixed(2) : "0.00";
            });
            
            return Object.values(groups).sort((a, b) => {
                if (a.year !== b.year) return parseInt(a.year) - parseInt(b.year);
                const termOrder = { '1': 1, '2': 2, 'Summer': 3 };
                return termOrder[a.term] - termOrder[b.term];
            });
        }

                    </div>
                    <span class="text-[11px] font-black ${isActive ? 'opacity-100 text-white' : 'opacity-0'}">${label}</span>
                </button>
            `;
        }

        function changeTab(tabId) {
            state.activeTab = tabId;
            renderApp();

            const isComplete = current >= max;

        function getGPAGraphHTML(data) {
            if (!data || data.length === 0) {
                return `<div class="brutal-box p-6 text-center font-bold text-black border-dashed opacity-70">ยังไม่มีข้อมูลสำหรับสร้างกราฟ (เพิ่มวิชาเรียนก่อน)</div>`;
            }

            const width = 350; const height = 180;
            const paddingX = 40; const paddingY = 30;

            const getX = (index) => paddingX + (index * (width - 2 * paddingX) / Math.max(1, data.length - 1));
            const getY = (gpa) => height - paddingY - (parseFloat(gpa) / 4.0) * (height - 2 * paddingY);

            const points = data.map((d, i) => ({ x: getX(i), y: getY(d.gpa), ...d }));
            const pathD = points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');

            let gridLines = [0, 1, 2, 3, 4].map(val => `
                <g>
                    <line x1="${paddingX}" y1="${getY(val)}" x2="${Math.max(width, data.length * 80)}" y2="${getY(val)}" stroke="#000" stroke-width="1" stroke-dasharray="4 4" class="opacity-30" />
                    <text x="${paddingX - 10}" y="${getY(val) + 4}" font-size="10" font-weight="900" text-anchor="end" fill="#000">${val.toFixed(1)}</text>
                </g>
            `).join('');

            let dataPoints = points.map((p, i) => `
                <g>
                    <circle cx="${p.x}" cy="${p.y}" r="6" fill="#FFBE5D" stroke="#000" stroke-width="2" />
                    <text x="${p.x}" y="${p.y - 12}" font-size="12" font-weight="900" text-anchor="middle" fill="#000" style="text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff">${p.gpa}</text>
                    <text x="${p.x}" y="${height - 5}" font-size="10" font-weight="bold" text-anchor="middle" fill="#000">${p.label}</text>
                </g>
            `).join('');

            return `
                <div class="brutal-box p-2 pb-4 overflow-hidden bg-white">
                    <div class="bg-[#272B4A] border-b-[3px] border-black p-2 -mx-2 -mt-2 mb-4 text-center">
                        <h3 class="font-black text-[#FFBE5D] uppercase text-sm">แนวโน้มผลการเรียน (GPA Trend)</h3>
                    </div>
                    <div class="w-full overflow-x-auto custom-scrollbar">
                        <svg viewBox="0 0 ${Math.max(width, data.length * 80)} ${height}" class="w-full h-auto min-w-[300px]">
                            ${gridLines}
                            <path d="${pathD}" fill="none" stroke="#4A4585" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
                            ${dataPoints}
                        </svg>
                    </div>
                </div>
            `;
        }

            state.editingId = editId;

            } else {
                state.formData = { code: '', name: '', credits: 3, grade: 'A', category: 'core', subCategory: '', year: '1', term: '1' };

            renderFormModal();
            document.getElementById('formModalContainer').classList.remove('hidden');
            document.getElementById('formModalContainer').classList.add('flex');

            document.getElementById('formModalContainer').classList.add('hidden');
            document.getElementById('formModalContainer').classList.remove('flex');

            if (val === "") return;
            const selected = COURSE_DATABASE[val];
            const defaultGrade = (selected.code === '942-1101' || selected.code === '942-1102') ? 'S' : 'A';
            
            state.formData = {
                ...state.formData,
                code: selected.code,
                name: selected.name,
                credits: selected.credits,
                category: selected.category,
                subCategory: selected.subCategory || '',
                year: selected.year,
                term: selected.term,
                grade: defaultGrade
            };
            renderFormModal();
        };

            e.preventDefault();
            const dataToSave = { ...state.formData };
            if (dataToSave.category !== 'genEd') dataToSave.subCategory = '';

            if (state.editingId) {
                state.courses = state.courses.map(c => c.id === state.editingId ? { ...dataToSave, id: state.editingId } : c);

                state.courses.push({ ...dataToSave, id: Date.now().toString() });

            closeCourseModal();
            renderApp();

                        <label class="block font-black mb-2 text-sm">กลุ่มวิชาศึกษาทั่วไป</label>
                        <select required class="brutal-input !bg-white" onchange="updateFormData('subCategory', this.value)">
                            <option value="" disabled ${!state.formData.subCategory ? 'selected' : ''}>-- เลือกกลุ่มวิชา --</option>
                            ${Object.entries(CURRICULUM.genEd.subs).map(([k, v]) => `<option value="${k}" ${state.formData.subCategory == k ? 'selected' : ''}>${v.name}</option>`).join('')}
                        </select>
                    </div>` : ''}

                    <button type="submit" class="brutal-btn w-full py-5 text-2xl bg-[#4A4585] text-white mt-6 uppercase tracking-widest">
                        ${state.editingId ? 'บันทึกการแก้ไข' : 'เพิ่มรายวิชา'}
                    </button>
                </form>
            `;
        }

        // --- GEMINI AI INTEGRATION ---
        window.closeAiModal = function() {
            document.getElementById('aiModalContainer').classList.add('hidden');
        };

        window.handleGenerateAIAdvice = async function() {
            const container = document.getElementById('aiModalContainer');
            container.classList.remove('hidden');
            
            // Set loading state
            state.aiLoading = true;
            state.aiAdvice = "";
            renderAiModalContent();

            const stats = calculateStats();
            const courseSummary = state.courses.map(c => `- ${c.name} (หน่วยกิต: ${c.credits}): เกรด ${c.grade}`).join('\n');
            const prompt = `ช่วยวิเคราะห์ผลการเรียนของนักศึกษาคนนี้:\n\nเกรดเฉลี่ยสะสม (GPAX): ${stats.gpa}\nสถานะ: ${stats.studentStatus}\n\nรายวิชาที่เรียนไปแล้ว:\n${courseSummary || "ยังไม่ได้ลงทะเบียนเรียน"}\n\nคำสั่ง: จากรายวิชาและเกรดที่ได้ โปรดวิเคราะห์ว่านักศึกษาคนนี้มีความถนัดด้านใด (อิงจากวิชาที่ได้เกรดดี) มีจุดใดที่ควรระวังหรือพัฒนาเพิ่ม และแนะนำสายอาชีพ (Career Path) ด้าน Digital Design and Technology ที่เหมาะสมกับเขา`;

            try {
                const apiKey = ""; // Gemini API key provided by environment
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "คุณคือผู้ให้คำปรึกษาทางวิชาการ (Academic Advisor) ที่เชี่ยวชาญด้าน Digital Design and Technology คุณมีหน้าที่วิเคราะห์ผลการเรียนของนักศึกษา ให้คำแนะนำเชิงบวก สรุปจุดแข็งจากวิชาที่ได้เกรดดี และแนะนำสายอาชีพที่เหมาะสมในวงการดิจิทัล (เช่น UX/UI, 3D, Developer, Graphic, IoT) ตอบด้วยภาษาไทยที่กระชับ เป็นกันเอง และให้กำลังใจ จัดรูปแบบด้วย Markdown" }] }
                };

                let resultText = "ไม่สามารถวิเคราะห์ข้อมูลได้ในขณะนี้";
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let attempt = 0; attempt <= delays.length; attempt++) {
                    try {
                        const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || resultText;
                        break;
                    } catch (error) {
                        if (attempt === delays.length) throw new Error("การเชื่อมต่อระบบขัดข้อง โปรดลองใหม่อีกครั้งในภายหลัง");
                        await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                    }
                }
                state.aiAdvice = resultText;
            } catch (err) {
                state.aiAdvice = `**เกิดข้อผิดพลาด:** ${err.message}`;
            } finally {
                state.aiLoading = false;
                renderAiModalContent();
            }
        };

        function renderAiModalContent() {
            const container = document.getElementById('aiModalContainer');
            
            let contentHTML = '';
            if (state.aiLoading) {
                contentHTML = `
                    <div class="flex flex-col items-center justify-center py-10 space-y-4 text-center">
                        <i data-lucide="loader-2" style="width: 48px; height: 48px;" class="animate-spin text-[#4A4585]"></i>
                        <p class="font-bold text-gray-700 animate-pulse">กำลังประมวลผลผลการเรียนของคุณ...</p>
                    </div>
                `;
            } else {
                let formattedAdvice = state.aiAdvice.split('\n').map(line => {
                    return `<p class="mb-2">${line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')}</p>`;
                }).join('');

                contentHTML = `
                    <div class="prose prose-sm max-w-none text-black whitespace-pre-wrap font-medium">
                        ${formattedAdvice}
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="brutal-box bg-white w-full max-w-md max-h-[85vh] flex flex-col overflow-hidden animate-fade-in">
                    <div class="bg-[#A78BFA] p-4 border-b-[3px] border-black flex justify-between items-center">
                        <h3 class="font-black text-xl flex items-center gap-2">
                            <i data-lucide="sparkles"></i> AI Advisor
                        </h3>
                        <button onclick="closeAiModal()" class="bg-white border-2 border-black p-1 shadow-[2px_2px_0_0_#000] active:shadow-none active:translate-y-1 active:translate-x-1">
                            <i data-lucide="x" style="width: 20px; height: 20px;"></i>
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto custom-scrollbar flex-1">
                        ${contentHTML}
                    </div>
                    <div class="p-4 border-t-[3px] border-black bg-[#F4F4F0]">
                        <button onclick="closeAiModal()" class="brutal-btn w-full py-3 bg-[#FFBE5D] text-black">
                            เข้าใจแล้ว
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // ==========================================
        // 5. INITIALIZE APP
        // ==========================================
        window.onload = function() {
            loadData();
            renderApp();
        };

    </script>
</body>
</html>
