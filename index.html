<html lang="th" class="dark">
<head>

    <title>MyGradPath - Digital Design and Technology</title>
    
    <!-- App Icons (สำหรับการตั้งเป็นไอคอนบนหน้าจอโฮมมือถือ) -->

    <!-- Tailwind CSS with Dark Mode Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class', // Enable class-based dark mode
        }
    </script>
    
    <!-- Script to prevent theme flash on load -->
    <script>
        const savedData = localStorage.getItem('mygradpath_local_data_v2');
        let initialTheme = 'dark';
        if (savedData) {
            try {
                const parsed = JSON.parse(savedData);
                if (parsed.theme) initialTheme = parsed.theme;
            } catch (e) {}
        }
        if (initialTheme === 'dark') {
            document.documentElement.classList.add('dark');
        } else {
            document.documentElement.classList.remove('dark');
        }
    </script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Sarabun:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', 'Sarabun', sans-serif; 
        }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(116, 149, 232, 0.3); border-radius: 10px; }
        .animate-fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Modern Glassmorphism System - Light Mode (Default) */
        .glass-panel { 
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.7) 0%, rgba(240, 245, 250, 0.6) 100%);
            backdrop-filter: blur(16px); 
            -webkit-backdrop-filter: blur(16px); 
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 1.5rem; 
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.05); 
            transition: all 0.4s ease;
        }
        
        .glass-card { 
            background: rgba(255, 255, 255, 0.6); 
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.8); 
            border-radius: 1.25rem; 
            transition: all 0.3s ease; 
            box-shadow: 0 4px 16px 0 rgba(31, 38, 135, 0.03);
        }
        .glass-card:hover { background: rgba(255, 255, 255, 0.9); }
        
        .glass-btn { 
            background: linear-gradient(135deg, #7495E8 0%, #4A4585 100%); 
            border-radius: 9999px; /* Pill shape */
            color: white; 
            font-weight: 600; 
            transition: all 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 4px 15px rgba(116, 149, 232, 0.2); 
        }
        .glass-btn:hover:not(:disabled) { 
            transform: translateY(-2px); 
            box-shadow: 0 6px 20px rgba(116, 149, 232, 0.4); 
            background: linear-gradient(135deg, #8aa7f0 0%, #5b559e 100%);
        }
        .glass-btn:active:not(:disabled) { transform: translateY(1px); }
        .glass-btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(100%); }
        
        .glass-btn-warning { 
            background: linear-gradient(135deg, #FFBE5D 0%, #FFAE3D 100%); 
            color: #121420; 
            box-shadow: 0 4px 15px rgba(255, 190, 93, 0.25); 
            border: none;
        }
        .glass-btn-warning:hover:not(:disabled) {
            background: linear-gradient(135deg, #ffd085 0%, #ffbf5c 100%);
            box-shadow: 0 6px 20px rgba(255, 190, 93, 0.4); 
        }

        .glass-input { 
            width: 100%; 
            background: rgba(255, 255, 255, 0.6); 
            border: 1px solid rgba(0,0,0,0.05); 
            border-radius: 1rem; 
            padding: 0.875rem; 
            color: #1e293b; 
            transition: all 0.3s; 
            outline: none; 
        }
        .glass-input:focus { 
            border-color: #7495E8; 
            background: rgba(255, 255, 255, 0.9); 
            box-shadow: 0 0 0 2px rgba(116, 149, 232, 0.2); 
        }
        .glass-input option { background-color: #ffffff; color: #1e293b; }

        /* Glass Components - Dark Mode */
        .dark .glass-panel { 
            background: linear-gradient(135deg, rgba(74, 69, 133, 0.3) 0%, rgba(39, 43, 74, 0.5) 100%);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); 
        }
        .dark .glass-card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
            box-shadow: none;
        }
        .dark .glass-card:hover { background: rgba(255, 255, 255, 0.06); }
        .dark .glass-input { 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(255,255,255,0.1); 
            color: white; 
        }
        .dark .glass-input:focus { 
            background: rgba(116, 149, 232, 0.05); 
        }
        .dark .glass-input option { background-color: #272B4A; color: white; }
    </style>
</head>

            const savedData = localStorage.getItem(LOCAL_STORAGE_KEY);
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);

                    if (parsed.courses) state.courses = parsed.courses;
                    if (parsed.profile) state.profile = parsed.profile;
                    if (parsed.conditions) state.conditions = parsed.conditions;
                } catch (e) {
                    console.error("Failed to parse local data", e);
                }
            }
            applyTheme();
        }

        function saveData() {
            const dataToSave = { theme: state.theme, courses: state.courses, profile: state.profile, conditions: state.conditions };
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(dataToSave));
        }

        function applyTheme() {
            if (state.theme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        }

            saveData();
            renderApp(); // Re-render to update toggle UI and colors

        // ==========================================
        // 3. CALCULATIONS
        // ==========================================
        function calculateStats() {
            let totalCredits = 0; 
            let totalGradePoints = 0;
            let gpaCredits = 0; 
            const categoryCredits = {
                genEd: { total: 0, subs: { thai: 0, foreign: 0, sci: 0, math: 0, social: 0, human: 0, other: 0 } },
                core: 0, majorReq: 0, majorElec: 0, freeElec: 0
            };
            let calculatedHasF = false;

            state.courses.forEach(c => {
                const cred = Number(c.credits);
                
                // ไม่นำ S และ U มาคิด GPA
                if (c.grade !== 'S' && c.grade !== 'U') {
                    gpaCredits += cred;
                    totalGradePoints += cred * (GRADE_WEIGHTS[c.grade] || 0);
                }

                if (c.grade === 'F' || c.grade === 'U') calculatedHasF = true;
                else {
                    totalCredits += cred;
                    if (c.category === 'genEd') {
                        categoryCredits.genEd.total += cred;
                        if (c.subCategory && categoryCredits.genEd.subs[c.subCategory] !== undefined) {
                            categoryCredits.genEd.subs[c.subCategory] += cred;
                        }
                    } else if (categoryCredits[c.category] !== undefined) {
                        categoryCredits[c.category] += cred;
                    }
                }
            });

            const gpaRaw = gpaCredits > 0 ? (totalGradePoints / gpaCredits) : 0;
            const gpa = gpaRaw.toFixed(2);
            const actualHasF = state.conditions.hasF || calculatedHasF;

            // Honors Logic
            let honors = "ไม่มีสิทธิ์";
            let honorsColor = "text-gray-500 dark:text-white/60";
            
            if (!actualHasF && !state.conditions.hasRepeats && state.conditions.graduatesInTime) {
                if (gpaRaw >= 3.75) { honors = "เกียรตินิยมอันดับ 1"; honorsColor = "text-[#F59E0B] dark:text-[#FFBE5D]"; } 
                else if (gpaRaw >= 3.25) { honors = "เกียรตินิยมอันดับ 2"; honorsColor = "text-[#3B82F6] dark:text-[#7495E8]"; } 
                else { honors = "เกณฑ์ปกติ"; honorsColor = "text-gray-600 dark:text-white/80"; }
            } else {
                if (actualHasF) honors += " (เคยติด F/U)";
                else if (state.conditions.hasRepeats) honors += " (มีรีเกรด)";
                else if (!state.conditions.graduatesInTime) honors += " (เรียนเกิน)";
            }

            // Student Status Logic
            let studentStatus = "ปกติ";
            let studentStatusColor = "text-[#10B981] dark:text-[#34D399]";
            if (gpaCredits > 0) {
                if (gpaRaw < 1.50) {
                    studentStatus = "พ้นสภาพ";
                    studentStatusColor = "text-[#EF4444] dark:text-[#FF6B6B]";
                } else if (gpaRaw >= 1.50 && gpaRaw < 2.00) {
                    studentStatus = "วิทยาทัณฑ์";
                    studentStatusColor = "text-[#F59E0B] dark:text-[#FFAE3D]";
                }
            } else {
                studentStatus = "ไม่มีข้อมูล";
                studentStatusColor = "text-gray-400 dark:text-white/50";
            }

            return { totalCredits, gpa, honors, honorsColor, studentStatus, studentStatusColor, categoryCredits };
        }

        function getTermGroups() {
            const groups = {};
            state.courses.forEach(c => {
                const key = `ปี ${c.year} เทอม ${c.term === 'Summer' ? 'S' : c.term}`;
                if (!groups[key]) groups[key] = { label: key, year: c.year, term: c.term, courses: [], gpa: 0, creditsForGpa: 0, points: 0 };
                groups[key].courses.push(c);
                
                const cred = Number(c.credits);
                if (c.grade !== 'S' && c.grade !== 'U') {
                    groups[key].creditsForGpa += cred;
                    groups[key].points += cred * (GRADE_WEIGHTS[c.grade] || 0);
                }
            });
            
            Object.keys(groups).forEach(k => {
               groups[k].gpa = groups[k].creditsForGpa > 0 ? (groups[k].points / groups[k].creditsForGpa).toFixed(2) : "0.00";
            });
            
            return Object.values(groups).sort((a, b) => {
                if (a.year !== b.year) return parseInt(a.year) - parseInt(b.year);
                const termOrder = { '1': 1, '2': 2, 'Summer': 3 };
                return termOrder[a.term] - termOrder[b.term];
            });
        }

        function getGPAGraphHTML(data) {
            if (!data || data.length === 0) {
                return `
                <div class="glass-panel p-6 text-center text-gray-500 dark:text-white/50 border border-black/10 dark:border-white/10 flex flex-col items-center justify-center min-h-[200px]">
                    <i data-lucide="bar-chart-2" style="width: 32px; height: 32px; margin-bottom: 8px; opacity: 0.5;"></i>
                    <p class="text-sm">เพิ่มรายวิชาเพื่อดูแนวโน้มผลการเรียน</p>
                </div>`;
            }

            const width = 350; const height = 180;
            const paddingX = 40; const paddingY = 30;

            const getX = (index) => paddingX + (index * (width - 2 * paddingX) / Math.max(1, data.length - 1));
            const getY = (gpa) => height - paddingY - (parseFloat(gpa) / 4.0) * (height - 2 * paddingY);

            const points = data.map((d, i) => ({ x: getX(i), y: getY(d.gpa), ...d }));
            const pathD = points.map((p, i) => (i === 0 ? `M ${p.x} ${p.y}` : `L ${p.x} ${p.y}`)).join(' ');

            let gridLines = [0, 1, 2, 3, 4].map(val => `
                <g>
                    <line x1="${paddingX}" y1="${getY(val)}" x2="${Math.max(width, data.length * 80)}" y2="${getY(val)}" stroke="currentColor" stroke-width="1" stroke-dasharray="4 4" class="text-black/10 dark:text-white/10" />
                    <text x="${paddingX - 10}" y="${getY(val) + 4}" font-size="10" font-weight="600" text-anchor="end" fill="currentColor" class="text-gray-400 dark:text-white/50">${val.toFixed(1)}</text>
                </g>
            `).join('');

            let dataPoints = points.map((p, i) => `
                <g>
                    <!-- Outer glow -->
                    <circle cx="${p.x}" cy="${p.y}" r="8" fill="currentColor" class="text-[#3B82F6]/30 dark:text-[#7495E8]/30" />
                    <!-- Inner dot -->
                    <circle cx="${p.x}" cy="${p.y}" r="4" fill="currentColor" class="text-[#3B82F6] dark:text-[#7495E8]" />
                    
                    <text x="${p.x}" y="${p.y - 14}" font-size="12" font-weight="bold" text-anchor="middle" fill="currentColor" class="text-gray-800 dark:text-white">${p.gpa}</text>
                    <text x="${p.x}" y="${height - 5}" font-size="10" font-weight="500" text-anchor="middle" fill="currentColor" class="text-gray-500 dark:text-white/60">${p.label.replace('ปี ', 'Y').replace(' เทอม ', 'T')}</text>
                </g>
            `).join('');

            return `
                <div class="glass-panel p-4 pb-6 overflow-hidden relative border border-black/5 dark:border-white/10">
                    <h3 class="font-semibold text-gray-700 dark:text-white/80 text-sm mb-4 pl-2 flex items-center gap-2">
                        <i data-lucide="trending-up" style="width:16px; height:16px;" class="text-[#3B82F6] dark:text-[#7495E8]"></i>
                        แนวโน้มผลการเรียน
                    </h3>
                    <div class="w-full overflow-x-auto custom-scrollbar pb-2">
                        <svg viewBox="0 0 ${Math.max(width, data.length * 80)} ${height}" class="w-full h-auto min-w-[300px]">
                            ${gridLines}
                            <path d="${pathD}" fill="none" stroke="url(#lineGradient)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
                            <defs>
                                <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" stop-color="#4A4585" />
                                    <stop offset="100%" stop-color="${state.theme === 'dark' ? '#7495E8' : '#3B82F6'}" />
                                </linearGradient>
                            </defs>
                            ${dataPoints}
                        </svg>
                    </div>
                </div>
            `;
        }

                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-full bg-gradient-to-br from-[#FFBE5D] to-[#FFAE3D] flex items-center justify-center text-black">
                                <i data-lucide="${state.theme === 'dark' ? 'moon' : 'sun'}" style="width:20px; height:20px;"></i>
                            </div>
                            <div>
                                <h3 class="font-semibold text-sm text-gray-800 dark:text-white">โหมดหน้าจอ</h3>
                                <p class="text-xs text-gray-500 dark:text-white/50">${state.theme === 'dark' ? 'โหมดมืด (Dark Mode)' : 'โหมดสว่าง (Light Mode)'}</p>
                            </div>
                        </div>
                        <button onclick="toggleTheme()" class="w-14 h-7 rounded-full transition-colors relative flex items-center shadow-inner ${state.theme === 'dark' ? 'bg-[#7495E8]' : 'bg-gray-300'}">
                            <div class="absolute left-1 top-1 w-5 h-5 rounded-full bg-white transition-transform duration-300 shadow-sm ${state.theme === 'dark' ? 'translate-x-7' : 'translate-x-0'}"></div>
                        </button>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 dark:text-white mt-8 mb-4 pl-2">ตั้งค่าโปรไฟล์</h2>
                    
                    <div class="glass-panel p-6 border border-black/5 dark:border-white/10">
                        <div class="flex items-center gap-4 mb-6 pb-6 border-b border-black/10 dark:border-white/10">
                            <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-[#4A4585] to-[#7495E8] flex items-center justify-center text-2xl font-bold text-white shadow-lg">
                                ${state.profile.firstName.charAt(0)}
                            </div>
                            <div>
                                <h3 class="font-semibold text-lg text-gray-800 dark:text-white">${state.profile.firstName}</h3>
                                <p class="text-xs text-gray-500 dark:text-white/50">ID: ${state.profile.studentId}</p>
                            </div>
                        </div>
                        
                        <div class="space-y-4">
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 dark:text-white/60 mb-1.5 uppercase">ชื่อ</label>
                                <input type="text" class="glass-input" value="${state.profile.firstName}" onchange="updateProfile('firstName', this.value)" />
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 dark:text-white/60 mb-1.5 uppercase">นามสกุล</label>
                                <input type="text" class="glass-input" value="${state.profile.lastName}" onchange="updateProfile('lastName', this.value)" />
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-gray-500 dark:text-white/60 mb-1.5 uppercase">รหัสนักศึกษา</label>
                                <input type="text" class="glass-input" value="${state.profile.studentId}" onchange="updateProfile('studentId', this.value)" />
                            </div>
                        </div>
                    </div>

                    <h2 class="text-xl font-bold text-gray-800 dark:text-white mt-8 mb-4 pl-2">เงื่อนไขเกียรตินิยม</h2>
                    <div class="glass-panel p-2 border border-black/5 dark:border-white/10">
                        ${[
                            { key: 'hasF', label: 'เคยติด F หรือ U มาก่อนหรือไม่?' },
                            { key: 'hasRepeats', label: 'เคยลงทะเบียนเรียนซ้ำ (รีเกรด)?' },
                            { key: 'graduatesInTime', label: 'คาดว่าจะเรียนจบตามหลักสูตร (4 ปี)' }
                        ].map(item => `
                            <label class="flex items-center gap-4 p-4 hover:bg-black/5 dark:hover:bg-white/5 rounded-xl cursor-pointer transition-colors">
                                <div class="relative flex items-center justify-center">
                                    <input type="checkbox" ${state.conditions[item.key] ? 'checked' : ''} onchange="updateCondition('${item.key}', this.checked)" class="appearance-none w-5 h-5 border border-gray-400 dark:border-white/30 rounded-md checked:bg-[#3B82F6] dark:checked:bg-[#7495E8] checked:border-transparent transition-colors peer shadow-sm" />
                                    <i data-lucide="check" class="absolute w-3 h-3 text-white opacity-0 peer-checked:opacity-100 pointer-events-none"></i>
                                </div>
                                <span class="font-medium text-sm text-gray-700 dark:text-white/90">${item.label}</span>
                            </label>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        // --- HANDLERS (EXPOSED TO WINDOW) ---
        window.updateProfile = function(key, val) {
            state.profile[key] = val;
            saveData();
            if (key !== 'firstName' && key !== 'lastName' && key !== 'studentId') renderApp();
        };
        
        window.updateCondition = function(key, val) {
            state.conditions[key] = val;
            saveData();
        };

        window.removeCourse = function(id) {
            if (confirm("ต้องการลบวิชานี้ใช่หรือไม่?")) {
                state.courses = state.courses.filter(c => c.id !== id);
                renderApp();
            }
        };

        window.openCourseModal = function(editId = null) {
            state.editingId = editId;
            if (editId) {
                const course = state.courses.find(c => c.id === editId);
                state.formData = { ...course };
            } else {
                state.formData = { code: '', name: '', credits: 3, grade: 'A', category: 'core', subCategory: '', year: '1', term: '1' };
            }
            renderFormModal();
            document.getElementById('formModalContainer').classList.remove('hidden');
            document.getElementById('formModalContainer').classList.add('flex');
        };

        window.closeCourseModal = function() {
            document.getElementById('formModalContainer').classList.add('hidden');
            document.getElementById('formModalContainer').classList.remove('flex');
        };

        window.handleSelectFromDB = function(val) {
            if (val === "") return;
            const selected = COURSE_DATABASE[val];
            const defaultGrade = (selected.code === '942-1101' || selected.code === '942-1102') ? 'S' : 'A';
            
            state.formData = {
                ...state.formData,
                code: selected.code,
                name: selected.name,
                credits: selected.credits,
                category: selected.category,
                subCategory: selected.subCategory || '',
                year: selected.year,
                term: selected.term,
                grade: defaultGrade
            };
            renderFormModal();
        };

        window.updateFormData = function(key, val) {
            if(key === 'credits') val = Number(val);
            state.formData[key] = val;
            if (key === 'category') renderFormModal(); // re-render for subcategory toggle
        };

        window.submitCourseForm = function(e) {
            e.preventDefault();
            const dataToSave = { ...state.formData };
            if (dataToSave.category !== 'genEd') dataToSave.subCategory = '';

            if (state.editingId) {
                state.courses = state.courses.map(c => c.id === state.editingId ? { ...dataToSave, id: state.editingId } : c);
            } else {
                state.courses.push({ ...dataToSave, id: Date.now().toString() });
            }
            closeCourseModal();
            renderApp();
        };

        function renderFormModal() {
            const container = document.getElementById('formModalContainer');
            
            // Group DB for dropdown
            const dbGrouped = {};
            COURSE_DATABASE.forEach((c, idx) => {
                const key = `ปีที่ ${c.year} ภาคการศึกษาที่ ${c.term}`;
                if (!dbGrouped[key]) dbGrouped[key] = [];
                dbGrouped[key].push({ ...c, originalIndex: idx });
            });

            let dbOptions = `<option value="" disabled selected>-- เลือกวิชา --</option>`;
            Object.entries(dbGrouped).forEach(([groupName, groupCourses]) => {
                dbOptions += `<optgroup label="${groupName}">`;
                groupCourses.forEach(c => {
                    dbOptions += `<option value="${c.originalIndex}">${c.code} ${c.name}</option>`;
                });
                dbOptions += `</optgroup>`;
            });

            container.innerHTML = `
                <div class="w-full max-w-sm mx-auto mt-6">
                    <div class="flex justify-between items-center mb-4 pl-2">
                        <h2 class="text-2xl font-bold text-gray-800 dark:text-white">${state.editingId ? 'แก้ไขวิชา' : 'เพิ่มรายวิชา'}</h2>
                        <button onclick="closeCourseModal()" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/10 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/20 transition-colors text-gray-800 dark:text-white">
                            <i data-lucide="x" style="width:18px; height:18px;"></i>
                        </button>
                    </div>
                    
                    ${!state.editingId ? `
                    <div class="glass-card p-4 mb-5 border-l-4 border-l-[#F59E0B] dark:border-l-[#FFBE5D] shadow-sm">
                        <label class="block font-medium mb-2 text-[#F59E0B] dark:text-[#FFBE5D] text-xs uppercase tracking-wider flex items-center gap-1.5"><i data-lucide="zap" style="width:14px; height:14px;"></i> กรอกอัตโนมัติจากแผน</label>
                        <select class="glass-input text-sm py-2.5" onchange="handleSelectFromDB(this.value)">
                            ${dbOptions}
                        </select>
                    </div>` : ''}

                    <form onsubmit="submitCourseForm(event)" class="glass-panel p-5 space-y-4 border border-black/5 dark:border-white/10 shadow-lg">
                        <div class="grid grid-cols-1 gap-4">
                            <div>
                                <label class="block font-medium text-xs text-gray-500 dark:text-white/60 mb-1.5 uppercase">รหัสวิชา</label>
                                <input required type="text" placeholder="DDM101" class="glass-input py-2.5" value="${state.formData.code}" onchange="updateFormData('code', this.value.toUpperCase())" />
                            </div>
                            <div>
                                <label class="block font-medium text-xs text-gray-500 dark:text-white/60 mb-1.5 uppercase">ชื่อวิชา</label>
                                <input required type="text" placeholder="ชื่อวิชา" class="glass-input py-2.5" value="${state.formData.name}" onchange="updateFormData('name', this.value)" />
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block font-medium text-xs text-gray-500 dark:text-white/60 mb-1.5">ปีการศึกษา</label>
                                <select class="glass-input py-2.5" onchange="updateFormData('year', this.value)">
                                    ${[1,2,3,4,5,6,7,8].map(y => `<option value="${y}" ${state.formData.year == y ? 'selected' : ''}>ปีที่ ${y}</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block font-medium text-xs text-gray-500 dark:text-white/60 mb-1.5">เทอม</label>
                                <select class="glass-input py-2.5" onchange="updateFormData('term', this.value)">
                                    <option value="1" ${state.formData.term == '1' ? 'selected' : ''}>เทอม 1</option>
                                    <option value="2" ${state.formData.term == '2' ? 'selected' : ''}>เทอม 2</option>
                                    <option value="Summer" ${state.formData.term == 'Summer' ? 'selected' : ''}>Summer</option>
                                </select>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block font-medium text-xs text-gray-500 dark:text-white/60 mb-1.5">หน่วยกิต</label>
                                <select class="glass-input py-2.5" onchange="updateFormData('credits', this.value)">
                                    ${[0,1,2,3,4,5,6,7,8].map(n => `<option value="${n}" ${state.formData.credits == n ? 'selected' : ''}>${n} นก.</option>`).join('')}
                                </select>
                            </div>
                            <div>
                                <label class="block font-medium text-xs text-[#3B82F6] dark:text-[#7495E8] mb-1.5">เกรดที่ได้</label>
                                <select class="glass-input py-2.5 !border-[#3B82F6]/30 dark:!border-[#7495E8]/50 bg-white dark:!bg-[#7495E8]/10" onchange="updateFormData('grade', this.value)">
                                    ${ALL_GRADE_OPTIONS.map(g => `<option value="${g}" ${state.formData.grade == g ? 'selected' : ''}>${g === 'S' ? 'S (ผ่าน)' : g === 'U' ? 'U (ไม่ผ่าน)' : g}</option>`).join('')}
                                </select>
                            </div>
                        </div>

                        <div>
                            <label class="block font-medium text-xs text-gray-500 dark:text-white/60 mb-1.5">หมวดวิชา</label>
                            <select class="glass-input py-2.5" onchange="updateFormData('category', this.value)">
                                ${Object.values(CURRICULUM).map(cat => `<option value="${cat.id}" ${state.formData.category == cat.id ? 'selected' : ''}>${cat.name}</option>`).join('')}
                            </select>
                        </div>

                        ${state.formData.category === 'genEd' ? `
                        <div class="p-3 bg-[#F59E0B]/5 dark:bg-[#FFBE5D]/10 border border-[#F59E0B]/20 dark:border-[#FFBE5D]/20 rounded-xl mt-2">
                            <label class="block font-medium text-xs text-[#F59E0B] dark:text-[#FFBE5D] mb-1.5">กลุ่มวิชาศึกษาทั่วไป</label>
                            <select required class="glass-input py-2.5" onchange="updateFormData('subCategory', this.value)">
                                <option value="" disabled ${!state.formData.subCategory ? 'selected' : ''}>-- เลือกกลุ่ม --</option>
                                ${Object.entries(CURRICULUM.genEd.subs).map(([k, v]) => `<option value="${k}" ${state.formData.subCategory == k ? 'selected' : ''}>${v.name}</option>`).join('')}
                            </select>
                        </div>` : ''}

                        <div class="pt-4">
                            <button type="submit" class="glass-btn w-full py-3.5 text-sm uppercase tracking-wider">
                                ${state.editingId ? 'บันทึกการแก้ไข' : 'เพิ่มลงในแอป'}
                            </button>
                        </div>
                    </form>
                </div>
            `;
            lucide.createIcons();
        }

        // --- GEMINI AI INTEGRATION ---
        window.closeAiModal = function() {
            document.getElementById('aiModalContainer').classList.add('hidden');
        };

        window.handleGenerateAIAdvice = async function() {
            const container = document.getElementById('aiModalContainer');
            container.classList.remove('hidden');
            
            state.aiLoading = true;
            state.aiAdvice = "";
            renderAiModalContent();

            const stats = calculateStats();
            const courseSummary = state.courses.map(c => `- ${c.name} (${c.credits} นก.): เกรด ${c.grade}`).join('\n');
            const prompt = `วิเคราะห์ผลการเรียนของนักศึกษาคนนี้:\n\nGPAX: ${stats.gpa}\nสถานะ: ${stats.studentStatus}\n\nวิชาที่เรียน:\n${courseSummary}\n\nโปรดวิเคราะห์ว่าถนัดด้านใด จุดที่ควรพัฒนา และแนะนำสายอาชีพ (Career Path) ด้าน Digital Design and Technology ที่เหมาะสม ตอบสั้นๆ กระชับ เป็นกันเอง ให้กำลังใจ (Markdown)`;

            try {
                const apiKey = ""; // Gemini API key provided by environment
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                const payload = {
                    contents: [{ parts: [{ text: prompt }] }],
                    systemInstruction: { parts: [{ text: "คุณคือ Academic Advisor สาขา Digital Design and Technology แนะนำสายอาชีพสั้นๆ กระชับ ให้อ่านง่ายบนมือถือ" }] }
                };

                let resultText = "ไม่สามารถเชื่อมต่อ AI ได้ในขณะนี้";
                const delays = [1000, 2000, 4000, 8000, 16000];
                for (let attempt = 0; attempt <= delays.length; attempt++) {
                    try {
                        const response = await fetch(url, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) });
                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                        const data = await response.json();
                        resultText = data.candidates?.[0]?.content?.parts?.[0]?.text || resultText;
                        break;
                    } catch (error) {
                        if (attempt === delays.length) throw new Error("Connection failed.");
                        await new Promise(resolve => setTimeout(resolve, delays[attempt]));
                    }
                }
                state.aiAdvice = resultText;
            } catch (err) {
                state.aiAdvice = `**ข้อผิดพลาด:** ${err.message}`;
            } finally {
                state.aiLoading = false;
                renderAiModalContent();
            }
        };

        function renderAiModalContent() {
            const container = document.getElementById('aiModalContainer');
            
            let contentHTML = '';
            if (state.aiLoading) {
                contentHTML = `
                    <div class="flex flex-col items-center justify-center py-12 space-y-5 text-center">
                        <div class="relative w-16 h-16 flex items-center justify-center">
                            <div class="absolute inset-0 border-4 border-t-[#F59E0B] dark:border-t-[#FFBE5D] border-r-[#FFAE3D] border-b-[#3B82F6] dark:border-b-[#7495E8] border-l-[#4A4585] rounded-full animate-spin"></div>
                            <i data-lucide="sparkles" class="text-[#F59E0B] dark:text-[#FFBE5D]" style="width:24px; height:24px;"></i>
                        </div>
                        <p class="font-medium text-sm text-gray-600 dark:text-white/80 animate-pulse">AI กำลังวิเคราะห์ผลการเรียน...</p>
                    </div>
                `;
            } else {
                let formattedAdvice = state.aiAdvice.split('\n').map(line => {
                    return `<p class="mb-2.5 text-[13px] leading-relaxed text-gray-700 dark:text-white/90">${line.replace(/\*\*(.*?)\*\*/g, `<strong class="text-[#F59E0B] dark:text-[#FFBE5D]">$1</strong>`)}</p>`;
                }).join('');

                contentHTML = `
                    <div class="prose prose-sm max-w-none">
                        ${formattedAdvice}
                    </div>
                `;
            }

            container.innerHTML = `
                <div class="glass-panel w-full max-w-sm flex flex-col overflow-hidden relative border-t border-[#F59E0B]/30 dark:border-[#FFBE5D]/30 max-h-[85vh] shadow-2xl">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-[#F59E0B]/10 dark:bg-[#FFBE5D]/20 rounded-full blur-3xl"></div>
                    <div class="p-5 border-b border-black/10 dark:border-white/10 flex justify-between items-center relative z-10">
                        <h3 class="font-bold text-lg flex items-center gap-2 text-gray-800 dark:text-white">
                            <div class="w-8 h-8 rounded-full bg-gradient-to-br from-[#FFBE5D] to-[#FFAE3D] flex items-center justify-center shadow-sm">
                                <i data-lucide="sparkles" class="text-[#121420]" style="width:16px; height:16px;"></i>
                            </div>
                            AI Advisor
                        </h3>
                        <button onclick="closeAiModal()" class="w-8 h-8 rounded-full bg-black/5 dark:bg-white/5 flex items-center justify-center hover:bg-black/10 dark:hover:bg-white/10 transition-colors text-gray-800 dark:text-white">
                            <i data-lucide="x" style="width: 18px; height: 18px;"></i>
                        </button>
                    </div>
                    <div class="p-6 overflow-y-auto custom-scrollbar flex-1 relative z-10 bg-white/40 dark:bg-transparent">
                        ${contentHTML}
                    </div>
                    <div class="p-4 border-t border-black/10 dark:border-white/10 relative z-10 bg-white/60 dark:bg-black/20">
                        <button onclick="closeAiModal()" class="glass-btn w-full py-3">
                            เข้าใจแล้ว
                        </button>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }

        // ==========================================
        // 5. INITIALIZE APP
        // ==========================================
        window.onload = function() {
            loadData();
            renderApp();
        };

    </script>
</body>
</html>
